<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenRA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #ccc; font-family: 'Lucida Console', 'Courier New', monospace; overflow: hidden; }

/* ── Home Screen ── */
#home {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; gap: 20px;
  background: #0a0a0a url('uibits/loadscreen.png') center center no-repeat;
  background-size: contain;
}
#home h1 { color: #c8a830; font-size: 28px; letter-spacing: 2px; }
#home p { color: #666; font-size: 13px; }
.home-buttons { display: flex; gap: 16px; margin-top: 8px; }
.home-btn {
  background: #3a3a28; color: #c8a830; border: 1px solid #5a5a3a; padding: 12px 28px;
  cursor: pointer; font-family: inherit; font-size: 15px;
}
.home-btn:hover { background: #4a4a38; border-color: #c8a830; }
.home-btn.secondary { color: #999; border-color: #444; }

/* ── Replay Setup ── */
#replay-setup {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; gap: 14px;
  background: #0a0a0a;
}
#replay-setup h2 { color: #c8a830; font-size: 20px; }
.file-inputs { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.file-inputs label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #888; }
input[type="file"] { font-size: 11px; color: #aaa; }

/* ── Game UI ── */
#game-ui { display: none; height: 100vh; width: 100vw; }
.game-layout { display: flex; height: 100vh; }
#canvas-wrap { flex: 1; position: relative; background: #000; }
canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

/* ── Right Sidebar (OpenRA style) ── */
#sidebar {
  width: 238px; background: #1a1a14; border-left: 2px solid #3a3a28;
  flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden;
  order: 1;
}

/* Radar/Minimap area */
#radar-area {
  height: 232px; background: #0a0a08; padding: 5px 8px;
  border-bottom: 2px solid #3a3a28;
}
#minimap-canvas {
  width: 222px; height: 222px; background: #000;
  image-rendering: pixelated;
}

/* Money bin */
#money-bin {
  height: 28px; background: #1a1a14; border-bottom: 1px solid #3a3a28;
  display: flex; align-items: center; padding: 0 8px; font-size: 12px;
  justify-content: space-between;
}
#money-bin .cash { color: #c8a830; font-weight: bold; }
#money-bin .power { color: #6a8a4a; font-weight: bold; }
#money-bin .power.low { color: #c84040; }

/* Production tabs */
#prod-tabs {
  display: flex; border-bottom: 1px solid #3a3a28;
}
.prod-tab {
  flex: 1; padding: 4px 0; text-align: center; font-size: 10px;
  background: #1a1a14; color: #666; border: none; border-right: 1px solid #2a2a1e;
  cursor: pointer; font-family: inherit; text-transform: uppercase;
}
.prod-tab:last-child { border-right: none; }
.prod-tab.active { background: #2a2a1e; color: #c8a830; }
.prod-tab:hover { color: #aaa; }

/* Production grid */
#prod-panel {
  flex: 1; overflow-y: auto; padding: 2px;
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 2px; align-content: start;
}
.prod-icon {
  width: 100%; aspect-ratio: 62/46; background: #1a1a14; border: 1px solid #2a2a1e;
  cursor: pointer; display: flex; flex-direction: column; align-items: center;
  justify-content: center; font-size: 9px; color: #888; position: relative;
  font-family: inherit;
}
.prod-icon:hover { border-color: #c8a830; background: #2a2a1e; }
.prod-icon .name { font-size: 9px; color: #ccc; }
.prod-icon .cost { font-size: 8px; color: #c8a830; }
.prod-icon.building-ready { border-color: #4a8a2a; }
.prod-icon .progress-bar {
  position: absolute; bottom: 0; left: 0; height: 3px; background: #c84040;
  transition: width 0.1s;
}
.prod-icon .progress-bar.done { background: #4a8a2a; }

/* Queue section */
#queue-section {
  border-bottom: 1px solid #3a3a28; padding: 4px 8px; display: none;
  max-height: 60px; overflow-y: auto;
}
#queue-section h3 { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 2px; }

/* Selection info */
#sel-section {
  border-bottom: 1px solid #3a3a28; padding: 4px 8px; display: none;
}
#sel-section h3 { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 2px; }
#sel-info { font-size: 11px; }
#sel-info .name { color: #c8a830; font-weight: bold; }
#sel-actions { display: flex; gap: 2px; margin-top: 4px; flex-wrap: wrap; }
.action-btn {
  background: #2a2a1e; color: #ccc; border: 1px solid #3a3a28; padding: 2px 8px;
  cursor: pointer; font-family: inherit; font-size: 10px;
}
.action-btn:hover { border-color: #c8a830; color: #c8a830; }

/* ── Command Bar (bottom-left of game area) ── */
#command-bar {
  position: absolute; bottom: 8px; left: 8px;
  display: flex; gap: 2px; background: rgba(10,10,8,0.85);
  padding: 3px; border: 1px solid #3a3a28;
}
.cmd-btn {
  width: 32px; height: 24px; background: #1a1a14; border: 1px solid #2a2a1e;
  color: #888; font-size: 9px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
}
.cmd-btn:hover { border-color: #c8a830; color: #c8a830; }

/* Replay controls overlay */
#replay-controls {
  position: absolute; top: 8px; left: 8px;
  background: rgba(10,10,8,0.85); padding: 6px 10px;
  border: 1px solid #3a3a28; display: none;
  font-size: 12px;
}
#replay-controls button {
  background: #2a2a1e; color: #c8a830; border: 1px solid #3a3a28;
  padding: 3px 10px; cursor: pointer; font-family: inherit; font-size: 11px;
}
#replay-controls button:hover { border-color: #c8a830; }
#replay-controls label { font-size: 10px; color: #888; }
input[type="range"] { width: 60px; vertical-align: middle; }

/* Game info overlay (top-right of game area, below radar) */
#game-info {
  position: absolute; top: 8px; right: 8px;
  background: rgba(10,10,8,0.7); padding: 4px 8px;
  font-size: 11px; color: #888; border: 1px solid rgba(58,58,40,0.5);
  pointer-events: none;
}

/* Status message overlay (bottom-center) */
#hud-msg {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,8,0.8); padding: 4px 12px;
  font-size: 12px; color: #c8a830; white-space: nowrap;
  pointer-events: none;
}
#hud-msg:empty { display: none; }

/* Tooltip */
#tooltip {
  display: none; position: fixed; z-index: 100;
  background: rgba(10,10,8,0.92); border: 1px solid #3a3a28;
  padding: 4px 8px; font-size: 11px; color: #ccc;
  pointer-events: none; white-space: nowrap;
  max-width: 200px;
}
#tooltip .tt-name { color: #c8a830; font-weight: bold; }
#tooltip .tt-hp { color: #6a8a4a; }
#tooltip .tt-hp.low { color: #c84040; }
#tooltip .tt-activity { color: #888; font-style: italic; }
</style>
</head>
<body>

<!-- Home Screen -->
<div id="home">
  <h1>OPENRA</h1>
  <p>Real-time strategy in the browser</p>
  <div style="display: flex; gap: 12px; align-items: center; margin-top: 8px; flex-wrap: wrap; justify-content: center;">
    <label style="font-size: 12px; color: #888;">Map:
      <select id="map-select" style="background: #2a2a1e; color: #c8a830; border: 1px solid #3a3a28; padding: 4px 8px; font-family: inherit;">
        <option value="0">Loading...</option>
      </select>
    </label>
    <label style="font-size: 12px; color: #888;">Difficulty:
      <select id="difficulty-select" style="background: #2a2a1e; color: #c8a830; border: 1px solid #3a3a28; padding: 4px 8px; font-family: inherit;">
        <option value="0">Easy</option>
        <option value="1" selected>Medium</option>
        <option value="2">Hard</option>
      </select>
    </label>
  </div>
  <div class="home-buttons">
    <button class="home-btn" id="btn-start-game">New Game</button>
    <button class="home-btn secondary" id="btn-watch-replay">Watch Replay</button>
  </div>
</div>

<!-- Replay Setup -->
<div id="replay-setup">
  <h2>Watch Replay</h2>
  <div class="file-inputs">
    <label>Replay (.orarep)<input type="file" id="replay-file" accept=".orarep"></label>
    <label>Map (.oramap)<input type="file" id="map-file" accept=".oramap"></label>
  </div>
  <div style="display: flex; gap: 10px; margin-top: 8px;">
    <button class="home-btn" id="btn-load-replay" disabled>Load</button>
    <button class="home-btn secondary" id="btn-back-home">Back</button>
  </div>
  <div id="replay-status" style="margin-top: 8px; font-size: 11px; color: #666;"></div>
</div>

<!-- Game UI -->
<div id="game-ui">
  <div class="game-layout">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="command-bar">
        <button class="cmd-btn" id="cmd-move" title="Move (M)">M</button>
        <button class="cmd-btn" id="cmd-attack" title="Attack Move (A)">A</button>
        <button class="cmd-btn" id="cmd-stop" title="Stop (S)">S</button>
        <button class="cmd-btn" id="cmd-deploy" title="Deploy (D)">D</button>
        <button class="cmd-btn" id="cmd-sell" title="Sell">$</button>
      </div>
      <div id="replay-controls">
        <button id="btn-play">Play</button>
        <button id="btn-step">Step</button>
        <label>Speed <input type="range" id="speed" min="1" max="60" value="10"> <span id="speed-val">10</span></label>
        <span id="hud-tick" style="margin-left:8px; color:#666;">Tick 0</span>
      </div>
      <div id="game-info"></div>
      <div id="hud-msg"></div>
    </div>
    <div id="sidebar">
      <div id="radar-area">
        <canvas id="minimap-canvas" width="222" height="222"></canvas>
      </div>
      <div id="money-bin">
        <span class="cash" id="hud-cash">$5000</span>
        <span class="power" id="hud-power">0/0</span>
      </div>
      <div id="sel-section">
        <h3>Selected</h3>
        <div id="sel-info"></div>
        <div id="sel-actions"></div>
      </div>
      <div id="queue-section">
        <h3>Queue</h3>
        <div id="queue-list"></div>
      </div>
      <div id="prod-tabs">
        <button class="prod-tab active" data-tab="buildings">Bld</button>
        <button class="prod-tab" data-tab="units">Unit</button>
      </div>
      <div id="prod-panel"></div>
    </div>
  </div>
</div>

<div id="tooltip"></div>
<script type="module" src="index.js"></script>
</body>
</html>
